name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: PHP ${{ matrix.php }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-24.04, ubuntu-24.04-arm, macos-latest ]
        php: [ "7.4", "8.0", "8.1", "8.2", "8.3", "8.4", "8.5" ]

    steps:
      - uses: actions/checkout@v6

      # -----------------------------------------------------------------------
      # Platform-specific toolchain
      # -----------------------------------------------------------------------
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build build-essential

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list cmake  &>/dev/null || brew install cmake
          brew list ninja  &>/dev/null || brew install ninja
          brew list gcc@14 &>/dev/null || brew install gcc@14
          echo "CC=gcc-14"   >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # PHP
      # -----------------------------------------------------------------------
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize

      # -----------------------------------------------------------------------
      # Build
      # -----------------------------------------------------------------------
      - name: Cache Glaze source
        uses: actions/cache@v5
        with:
          path: build/_deps/glaze-src
          key: glaze-v7.7.0-${{ runner.os }}

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      # -----------------------------------------------------------------------
      # Stage artifact with a descriptive name: glaze-php{ver}-{os}-{arch}.so
      # -----------------------------------------------------------------------
      - name: Stage artifact
        run: |
          OS=$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          cp build/glaze.so "glaze-php${{ matrix.php }}-${OS}-${ARCH}.so"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: glaze-php${{ matrix.php }}-${{ runner.os }}-${{ runner.arch }}
          path: glaze-php${{ matrix.php }}-*.so

  # ---------------------------------------------------------------------------
  # Collect all per-job artifacts and publish a GitHub release
  # ---------------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Read version from source
        id: version
        run: |
          VERSION=$(grep -oP '#define PHP_GLAZE_VERSION\s+"\K[^"]+' src/php_glaze.cpp)
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_FLAG="--target ${{ github.sha }}"
          else
            TARGET_FLAG=""
          fi
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --generate-notes \
            $TARGET_FLAG \
            artifacts/*.so

title: php-glaze
description: >
  High-performance PHP serialization extension wrapping the Glaze C++ library.
  Supports JSON, BEVE, CBOR, MessagePack, TOML, and YAML with ~1.4 GB/s throughput.

url: https://fduarte42.github.io
baseurl: /php-glaze

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false

# Apply default layout to all pages
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
